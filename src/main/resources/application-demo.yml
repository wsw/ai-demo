# Demo 环境配置（使用 H2 内存数据库）
server:
  port: 8080

spring:
  # 使用 H2 内存数据库
  datasource:
    url: jdbc:h2:mem:demo_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  # 禁用 Flyway
  flyway:
    enabled: false

# 日志配置
logging:
  level:
    root: WARN
    com.example.demo: INFO
    org.springframework.web: INFO
    org.hibernate: ERROR
